syntax = "proto3";

package search.v1;

option go_package = "github.com/yourorg/micromart/proto/search/v1;searchv1";

// ──────────────────────────────────────────────────────────────────────────────
// Search Service
// ──────────────────────────────────────────────────────────────────────────────

service SearchService {
  rpc SearchProducts (SearchProductsRequest) returns (SearchProductsResponse);
}

// ── SearchProducts ────────────────────────────────────────────────────────────

message SearchProductsRequest {
  string query        = 1;  // 全文検索クエリ
  string category_id  = 2;  // カテゴリフィルター
  int64  price_min    = 3;  // 価格範囲フィルター（0 = 下限なし）
  int64  price_max    = 4;  // 0 = 上限なし
  string sort_by      = 5;  // "relevance" | "price_asc" | "price_desc" | "newest"
  int32  page         = 6;
  int32  page_size    = 7;  // max 50
}

message SearchProductsResponse {
  repeated SearchResultItem items      = 1;
  int64                     total      = 2;
  int32                     page       = 3;
  int32                     page_size  = 4;
}

// ── Common ────────────────────────────────────────────────────────────────────

message SearchResultItem {
  string          product_id   = 1;
  string          name         = 2;
  string          description  = 3;
  int64           price        = 4;
  string          category_id  = 5;
  string          seller_id    = 6;
  repeated string images       = 7;
  float           score        = 8;  // Elasticsearch スコア
}
