# ⚠️  このファイルはテンプレートです。実際の値は以下のいずれかで管理してください:
#    - ローカル kind: kubectl create secret generic ...
#    - 本番: External Secrets Operator / Sealed Secrets
#
# コミット前に必ず base64 エンコードされた実値を削除し、このテンプレートのみを残すこと

# ── JWT Secret ──────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: jwt-secret
  namespace: micromart
type: Opaque
stringData:
  # 本番では openssl rand -base64 32 で生成
  JWT_SECRET: "REPLACE_WITH_STRONG_SECRET"
---
# ── PostgreSQL Secrets ──────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: postgres-users-secret
  namespace: micromart
type: Opaque
stringData:
  POSTGRES_PASSWORD: "REPLACE_WITH_DB_PASSWORD"
  DATABASE_URL: "postgres://micromart:REPLACE_WITH_DB_PASSWORD@postgres-users:5432/micromart_users?sslmode=disable"
---
