apiVersion: apps/v1
kind: Deployment
metadata:
  name: order
  namespace: micromart
  labels:
    app: order
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order
  template:
    metadata:
      labels:
        app: order
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      terminationGracePeriodSeconds: 60   # Saga 処理中の Graceful Shutdown に余裕を持たせる
      containers:
        - name: order
          image: localhost:5001/micromart-order:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 50051
              name: grpc
            - containerPort: 8081
              name: health
            - containerPort: 9090
              name: metrics
          env:
            - name: GRPC_PORT
              value: "50051"
            - name: HTTP_PORT
              value: "8081"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-orders-secret
                  key: DATABASE_URL
            - name: KAFKA_BROKERS
              value: "kafka-0.kafka:9092"
            - name: PAYMENT_SERVICE_ADDR
              value: "payment:50051"
            - name: PRODUCT_SERVICE_ADDR
              value: "product:50051"
            - name: SERVICE_NAME
              value: order-service
            - name: JAEGER_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: observability-config
                  key: JAEGER_ENDPOINT
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: order
  namespace: micromart
spec:
  selector:
    app: order
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
