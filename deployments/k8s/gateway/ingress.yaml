apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gateway
  namespace: micromart
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    # レートリミット (Nginx Ingress)
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "20"
spec:
  ingressClassName: nginx
  rules:
    - host: micromart.local    # /etc/hosts に 127.0.0.1 micromart.local を追加
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 80
  # TLS (本番環境では cert-manager で証明書を自動取得)
  # tls:
  #   - hosts:
  #       - micromart.local
  #     secretName: micromart-tls
