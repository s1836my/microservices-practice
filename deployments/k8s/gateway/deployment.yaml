apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: micromart
  labels:
    app: gateway
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: gateway
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: default
      terminationGracePeriodSeconds: 30
      containers:
        - name: gateway
          image: localhost:5001/micromart-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9090
              name: metrics
          env:
            - name: HTTP_PORT
              value: "8080"
            - name: METRICS_PORT
              value: "9090"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: JWT_SECRET
            - name: USER_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: gateway-config
                  key: USER_SERVICE_ADDR
            - name: PRODUCT_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: gateway-config
                  key: PRODUCT_SERVICE_ADDR
            - name: SEARCH_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: gateway-config
                  key: SEARCH_SERVICE_ADDR
            - name: CART_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: gateway-config
                  key: CART_SERVICE_ADDR
            - name: ORDER_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: gateway-config
                  key: ORDER_SERVICE_ADDR
            - name: SERVICE_NAME
              value: gateway
            - name: JAEGER_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: observability-config
                  key: JAEGER_ENDPOINT
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
